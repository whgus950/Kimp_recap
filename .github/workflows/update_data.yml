name: Daily Crypto Data Collection

on:
  schedule:
    # 매일 UTC 기준 01:20 에 실행 (한국 시간 KST 오전 10:20)
    # cron 표현식: 분 시 일 월 요일
    - cron: '20 1 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

permissions:
  contents: write

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필수 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 데이터 복원 (Backfill) 실행
        run: |
          # 어제와 오늘 날짜의 0시, 9시 데이터 빈틈을 체크하고 채워줍니다.
          # Ubuntu 컨테이너의 기본 시간대는 UTC이므로, 백필 로직 내에서 KST 기준으로 작동하는지 확인
          python backfill.py

      - name: 인덱스 업데이트
        run: |
          # data 폴더의 json 목록을 갱신합니다.
          python update_index.py

      - name: 변경된 데이터 커밋 및 푸시
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 변경사항이 없다면 커밋하지 않음
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update crypto data" && git push)
